<header class="navbar">
  <div class="logo" (click)="scrollTo('inicio')">
    <img src="/images/logo.png" alt="Esquina Verde Logo" />
    <span>Esquina Verde</span>
  </div>

  <!-- Hamburger -->
  <button class="hamburger" (click)="toggleMenu()">
    <i class="fas" [class.fa-bars]="!menuOpen" [class.fa-times]="menuOpen"></i>
  </button>

  <nav [class.open]="menuOpen">
    <button [class.active]="activeSection === 'inicio'" (click)="scrollTo('inicio')">Inicio</button>

    <button [class.active]="activeSection === 'servicios'" (click)="scrollTo('servicios')">
      Servicios
    </button>

    <button [class.active]="activeSection === 'gallery'" (click)="scrollTo('gallery')">
      Galería
    </button>

    <button [class.active]="activeSection === 'contact'" (click)="scrollTo('contact')">
      Contacto
    </button>

    <!-- Button visible only on mobile -->
    <button class="mobile-btn" (click)="scrollTo('contact')">Solicitar Presupuesto</button>
  </nav>

  <!-- Desktop button -->
  <button class="btn desktop-btn" (click)="scrollTo('contact')">Solicitar Presupuesto</button>
</header>
